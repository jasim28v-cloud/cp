name: Alhadath 24 Auto Update

on:
  schedule:
    - cron: '*/30 * * * *'  # التحديث كل 30 دقيقة
  workflow_dispatch:  # السماح بالتشغيل اليدوي

permissions:
  contents: write  # السماح بالكتابة في المستودع

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # 1. سحب الكود
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # سحب التاريخ الكامل لتجنب مشاكل Git

      # 2. إعداد Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'  # تحديد إصدار Python بوضوح

      # 3. تثبيت التبعيات
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # 4. تشغيل الكاشط
      - name: Run Scraper
        run: python scraper.py

      # 5. حفظ التغييرات في Git
      - name: Commit and Push changes
        run: |
          git config --global user.name "Alhadath24-Bot"
          git config --global user.email "bot@alhadath24.com"
          git add index.html output.json
          timestamp=$(TZ='Asia/Riyadh' date +"%Y-%m-%d %H:%M:%S")
          git commit -m "🤖 Auto Update News: ${timestamp}" || echo "No changes to commit"
          git pull --rebase origin main  # تجنب تعارضات Git
          git push origin main
