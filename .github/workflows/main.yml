name: VORTEX 26 - High Frequency Update

on:
  schedule:
    # تشغيل المهمة كل 30 دقيقة لضمان حداثة البيانات
    - cron: '*/30 * * * *'
  workflow_dispatch: # يتيح لك التشغيل اليدوي بضغطة زر من GitHub

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 سحب المستودع (Checkout)
        uses: actions/checkout@v4

      - name: 🐍 إعداد بيئة بايثون 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 تثبيت المكتبات اللازمة
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: ⚡ تشغيل محرك VORTEX
        run: python vortex_fashion.py

      - name: 📤 تحديث الموقع تلقائياً
        run: |
          git config --local user.email "vortex-bot@github.com"
          git config --local user.name "VORTEX-ULTRA-BOT"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "VORTEX: تم تحديث الموديلات بنجاح [$(date)]" && git push)
